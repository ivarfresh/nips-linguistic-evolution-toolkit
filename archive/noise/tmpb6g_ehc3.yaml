base_models:
  claude_haiku: anthropic/claude-3-haiku
  claude_haiku_45: anthropic/claude-haiku-4.5
  claude_main: anthropic/claude-3.5-sonnet
  claude_sonnet_45: anthropic/claude-sonnet-4.5
  deepseek_v3: deepseek/deepseek-chat-v3-0324
  gemini_3_flash: google/gemini-3-flash-preview
  gemini_3_pro: google/gemini-3-pro-preview
  gpt4_cheaper: openai/gpt-4o-mini
  gpt5_nano: openai/gpt-5-nano
  llama8b: meta-llama/llama-3.1-8b-instruct
experiment_sets:
  noise_bidirectional_mem3:
    game_params_list:
    - noisy_bidirectional
    - noisy_bidirectional_informed
    models:
    - gemini_3_pro
    - claude_sonnet_45
    myth_topics:
    - anything
    num_runs: 10
    personas:
    - neutral
    task_orders:
    - - game
    - - game
      - myth
    - - myth
      - game
    templates:
    - trust_game_default
  noise_bootstrap:
    game_params_list:
    - noisy_bootstrap_cooperation
    - noisy_bootstrap_cooperation_informed
    models:
    - gpt5_nano
    myth_topics:
    - anything
    num_runs: 8
    personas:
    - neutral
    task_orders:
    - - game
    - - game
      - myth
    - - myth
      - game
    templates:
    - trust_game_default
  noise_bootstrap_mem3:
    game_params_list:
    - noisy_bootstrap_cooperation
    - noisy_bootstrap_cooperation_informed
    models:
    - gpt5_nano
    myth_topics:
    - anything
    num_runs: 10
    personas:
    - neutral
    task_orders:
    - - game
    - - game
      - myth
    - - myth
      - game
    templates:
    - trust_game_default
  noise_negative_mem3:
    game_params_list:
    - noisy_negative_3
    - noisy_negative_3_informed
    models:
    - claude_sonnet_45
    - gemini_3_pro
    myth_topics:
    - anything
    num_runs: 1
    personas:
    - neutral
    task_orders:
    - - game
    - - game
      - myth
    - - myth
      - game
    templates:
    - trust_game_default
  noise_pilot:
    game_params_list:
    - noisy_bidirectional
    models:
    - gpt5_nano
    num_runs: 8
    personas:
    - neutral
    task_orders:
    - - game
    templates:
    - trust_game_default
game_params:
  default:
    endowment: 5
    memory_capacity: 3
    multiplier: 3
    noise_config: null
    num_agents: 2
    num_turns: 10
    other_player_names: default
    temperature: 0.8
  noisy_bidirectional:
    endowment: 5
    memory_capacity: 3
    multiplier: 3
    noise_config:
      applies_to: both
      inform_agents: false
      range: 1.0
      type: uniform
    num_agents: 2
    num_turns: 10
    other_player_names: default
    temperature: 0.8
  noisy_bidirectional_informed:
    endowment: 5
    memory_capacity: 3
    multiplier: 3
    noise_config:
      applies_to: both
      inform_agents: true
      range: 1.0
      type: uniform
    num_agents: 2
    num_turns: 10
    other_player_names: default
    temperature: 0.8
  noisy_bootstrap_cooperation:
    endowment: 5
    memory_capacity: 3
    multiplier: 3
    noise_config:
      applies_to: returned
      inform_agents: false
      probability: 1.0
      replacement: max
      type: probabilistic
    num_agents: 2
    num_turns: 10
    other_player_names: default
    temperature: 0.8
  noisy_bootstrap_cooperation_informed:
    endowment: 5
    memory_capacity: 3
    multiplier: 3
    noise_config:
      applies_to: returned
      inform_agents: true
      probability: 1.0
      replacement: max
      type: probabilistic
    num_agents: 2
    num_turns: 10
    other_player_names: default
    temperature: 0.8
  noisy_negative_3:
    endowment: 5
    memory_capacity: 3
    multiplier: 3
    noise_config:
      applies_to: both
      direction: negative
      inform_agents: false
      range: 3.0
      type: uniform
    num_agents: 2
    num_turns: 10
    other_player_names: default
    temperature: 0.8
  noisy_negative_3_informed:
    endowment: 5
    memory_capacity: 3
    multiplier: 3
    noise_config:
      applies_to: both
      direction: negative
      inform_agents: true
      range: 3.0
      type: uniform
    num_agents: 2
    num_turns: 10
    other_player_names: default
    temperature: 0.8
myth_topics:
  anything: anything
  prosocial_religion_cultural_evolution: the rise and spread of moralizing supernatural
    agents
  trickster_betrayal_and_price: a trickster who exploits others and the price that
    follows
personas:
  altruistic:
    description: altruistic
    system_addition: You tend to prioritize others' welfare and act generously, even
      at personal cost.
  neutral:
    description: neutral
    system_addition: ''
  selfish:
    description: selfish
    system_addition: You prioritize your own interests and payoffs above all else.
prompt_templates:
  myth_writing_default: 'Write a myth about {myth_topic}. Write 200 words.

    '
  myth_writing_later_rounds: 'Here is the myth you wrote in the previous round:

    {last_myth}


    Here is the myth the other agent wrote in the previous round:

    {other_agent_myth}


    Write your own myth. Use your previous myth as inspiration, but adapt it in your
    own way.

    Write 200 words. Format exactly:

    Myth: [your story here].

    '
  trust_game_default: 'You are an agent participating in a multi-task experiment.
    You will play a trust game and may also be asked to write myths.


    TRUST GAME:

    You will play different roles across multiple rounds.


    When you are the INVESTOR:

    - You receive ${endowment} each round

    - You decide how much to SEND to the TRUSTEE ($0-${endowment})

    - Amount sent is multiplied by {multiplier}x

    - Trustee decides how much to RETURN

    - You keep: ${endowment} - sent + returned

    - Trustee keeps: received - returned

    - Response format: {{''send'': <amount>}}


    When you are the TRUSTEE:

    - Investor receives ${endowment}

    - Investor decides how much to SEND to you ($0-${endowment})

    - Amount sent is multiplied by {multiplier}x

    - You decide how much to RETURN

    - Investor keeps: ${endowment} - sent + returned

    - You keep: received - returned

    - Response format: {{''return'': <amount>}}


    MYTH WRITING:

    You may also be asked to write short myths (stories) on various topics. When writing
    myths, follow the instructions provided in each prompt.


    IMPORTANT: Provide your decision in the correct JSON format.

    '
  trust_game_later_investor: 'Round {turn}


    You are the INVESTOR this round. Last round you were the TRUSTEE. {investor_name}
    sent ${last_round_sent},

    that was {last_round_sent_percentage:.1f}% of their total endowment. You received
    ${last_round_received}.

    You returned ${last_round_returned}. So your payoff was {last_round_trustee_payoff}.

    Your total earnings across all rounds are ${agent_balance}.

    How much do you send to {trustee_name} this round? (0-{endowment})

    '
  trust_game_later_trustee: 'Round {turn}


    You are the TRUSTEE this round. Last round you were the INVESTOR. You sent ${last_round_sent},

    that was {last_round_sent_percentage:.1f}% of your total endowment. This was tripled
    to ${last_round_received}.

    {trustee_name} returned ${last_round_returned}. So your payoff was {last_round_investor_payoff}.

    Your total earnings across all rounds are ${agent_balance}.

    {investor_name} has sent you ${received} this round. How much do you return to
    {investor_name}? (0-{received})

    '
  trust_game_noisy_aware: 'You are an agent participating in a multi-task experiment.
    You will play a trust game and may also be asked to write myths.


    TRUST GAME:

    You will play different roles across multiple rounds.


    When you are the INVESTOR:

    - You receive ${endowment} each round

    - You decide how much to SEND to the TRUSTEE ($0-${endowment})

    - Amount sent is multiplied by {multiplier}x

    - Trustee decides how much to RETURN

    - You keep: ${endowment} - sent + returned

    - Trustee keeps: received - returned

    - Response format: {{''send'': <amount>}}


    When you are the TRUSTEE:

    - Investor receives ${endowment}

    - Investor decides how much to SEND to you ($0-${endowment})

    - Amount sent is multiplied by {multiplier}x

    - You decide how much to RETURN

    - Investor keeps: ${endowment} - sent + returned

    - You keep: received - returned

    - Response format: {{''return'': <amount>}}


    NOTE: There may be communication noise in this game. The amounts you see may differ
    from what was actually sent/returned. Can you filter out the noise?


    MYTH WRITING:

    You may also be asked to write short myths (stories) on various topics.


    IMPORTANT: Provide your decision in the correct JSON format.

    '
  trust_game_round1_investor: 'Round 1: You are the INVESTOR. You have ${endowment}.
    How much do you send? (0-{endowment})

    '
  trust_game_round1_trustee: 'Round 1: You are the TRUSTEE. {investor_name} sent ${sent},
    that is {percentage:.1f}% of their total endowment. You received ${received}.
    How much do you return to {investor_name}? (0-{received})

    '
